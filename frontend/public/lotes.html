<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/design-system/theme/index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotes de Producción | PROD-SYS</title>
        <link rel="stylesheet" href="/design-system/index.css">
    <script src="js/auth.js?v=1.5"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/design-system/index.js" defer></script>
<script src="js/auth.js"></script>
</head>
<body>

            <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                PROD-SYS
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item nav-item-single ">
                    <i data-lucide="layout-dashboard" class="nav-icon"></i>
                    <span>Dashboard</span>
                </a>

                <div class="nav-group ">
                    <button class="nav-group-toggle">
                        <i data-lucide="clipboard-list" class="nav-icon"></i>
                        <span>Producción</span>
                        <i data-lucide="chevron-right" class="chevron"></i>
                    </button>
                    <div class="nav-group-items">
                        <a href="/bitacora.html" class="nav-item ">Bitácora de Turno</a>
                        <a href="/ordenes.html" class="nav-item ">Órdenes</a>
                        <a href="/ejecucion.html" class="nav-item ">Ejecución</a>
                        <a href="/incidentes.html" class="nav-item ">Incidentes</a>
                    </div>
                </div>

                <div class="nav-group ">
                    <button class="nav-group-toggle">
                        <i data-lucide="shield-check" class="nav-icon"></i>
                        <span>Control</span>
                        <i data-lucide="chevron-right" class="chevron"></i>
                    </button>
                    <div class="nav-group-items">
                        <a href="/calidad.html" class="nav-item ">Calidad</a>
                        <a href="/trazabilidad.html" class="nav-item ">Trazabilidad</a>
                    </div>
                </div>

                <div class="nav-group ">
                    <button class="nav-group-toggle">
                        <i data-lucide="settings" class="nav-icon"></i>
                        <span>Sistema</span>
                        <i data-lucide="chevron-right" class="chevron"></i>
                    </button>
                    <div class="nav-group-items">
                        <a href="/configuracion.html" class="nav-item ">Configuración</a>
                        <a href="/auditoria.html" class="nav-item ">Auditoría</a>
                    </div>
                </div>
            </nav>
            <div style="padding: 16px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div id="user-display" style="margin-bottom: 12px; font-size: 13px; color: rgba(255,255,255,0.7);">
                    <i data-lucide="user" style="width:14px; height:14px; vertical-align:middle; margin-right:8px;"></i>
                    <span id="user-name-label">Usuario: -</span>
                </div>
                <a href="/login.html" id="logout-link" class="btn btn-secondary" style="width: 100%; justify-content: flex-start; background: rgba(255,255,255,0.1); border: none; color: white;">
                    <i data-lucide="log-out" class="nav-icon"></i>
                    <span>Cerrar Sesión</span>
                </a>
            </div>
        </aside>

        <div class="main-container" id="main-content">
            <header class="topbar">
                <h1>Lotes</h1>
                <div class="topbar-actions">
                    <button id="theme-toggle" class="btn btn-secondary" style="padding: 4px 8px; min-height: 32px; border: none; background: transparent;" title="Cambiar tema">
                        <i data-lucide="sun" class="sun-icon" style="width: 18px; height: 18px;"></i>
                        <i data-lucide="moon" class="moon-icon" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="card-header">Crear Nuevo Lote</div>
                    <form id="form-crear-lote">
                        <div class="form-group">
                            <label for="orden-produccion-id">Orden de Producción</label>
                            <select class="form-control" id="orden-produccion-id" name="orden-produccion-id" required>
                                <option value="">Cargando órdenes...</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Crear Lote</button>
                    </form>
                    <div id="mensaje-creacion" class="mt-4"></div>
                </div>

                <div class="card">
                    <div class="card-header">Lotes Registrados</div>
                    <div class="table-container">
                        <table class="table" id="tabla-lotes">
                            <thead>
                                <tr>
                                    <th>ID del Lote</th>
                                    <th>ID de Orden</th>
                                    <th>Fecha de Creación</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Las filas se insertarán aquí dinámicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/lotes.js"></script>
</body>
</html>
