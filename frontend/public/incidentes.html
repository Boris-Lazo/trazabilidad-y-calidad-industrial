<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/design-system/theme/index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Incidentes | PROD-SYS</title>
        <link rel="stylesheet" href="/design-system/index.css">
    <script src="js/auth.js?v=1.5"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/design-system/index.js" defer></script>
<script src="js/auth.js"></script>
</head>
<body>

            <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                PROD-SYS
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item nav-item-single ">
                    <i data-lucide="layout-dashboard" class="nav-icon"></i>
                    <span>Dashboard</span>
                </a>

                <div class="nav-group open">
                    <button class="nav-group-toggle">
                        <i data-lucide="clipboard-list" class="nav-icon"></i>
                        <span>Producción</span>
                        <i data-lucide="chevron-right" class="chevron"></i>
                    </button>
                    <div class="nav-group-items">
                        <a href="/bitacora.html" class="nav-item ">Bitácora de Turno</a>
                        <a href="/ordenes.html" class="nav-item ">Órdenes</a>
                        <a href="/ejecucion.html" class="nav-item ">Ejecución</a>
                        <a href="/incidentes.html" class="nav-item active">Incidentes</a>
                    </div>
                </div>

                <div class="nav-group ">
                    <button class="nav-group-toggle">
                        <i data-lucide="shield-check" class="nav-icon"></i>
                        <span>Control</span>
                        <i data-lucide="chevron-right" class="chevron"></i>
                    </button>
                    <div class="nav-group-items">
                        <a href="/calidad.html" class="nav-item ">Calidad</a>
                        <a href="/trazabilidad.html" class="nav-item ">Trazabilidad</a>
                    </div>
                </div>

                <div class="nav-group ">
                    <button class="nav-group-toggle">
                        <i data-lucide="settings" class="nav-icon"></i>
                        <span>Sistema</span>
                        <i data-lucide="chevron-right" class="chevron"></i>
                    </button>
                    <div class="nav-group-items">
                        <a href="/configuracion.html" class="nav-item ">Configuración</a>
                        <a href="/auditoria.html" class="nav-item ">Auditoría</a>
                    </div>
                </div>
            </nav>
            <div style="padding: 16px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div id="user-display" style="margin-bottom: 12px; font-size: 13px; color: rgba(255,255,255,0.7);">
                    <i data-lucide="user" style="width:14px; height:14px; vertical-align:middle; margin-right:8px;"></i>
                    <span id="user-name-label">Usuario: -</span>
                </div>
                <a href="/login.html" id="logout-link" class="btn btn-secondary" style="width: 100%; justify-content: flex-start; background: rgba(255,255,255,0.1); border: none; color: white;">
                    <i data-lucide="log-out" class="nav-icon"></i>
                    <span>Cerrar Sesión</span>
                </a>
            </div>
        </aside>

        <div class="main-container" id="main-content">
            <header class="topbar">
                <h1>Incidentes</h1>
                <div class="topbar-actions">
                    <button id="theme-toggle" class="btn btn-secondary" style="padding: 4px 8px; min-height: 32px; border: none; background: transparent;" title="Cambiar tema">
                        <i data-lucide="sun" class="sun-icon" style="width: 18px; height: 18px;"></i>
                        <i data-lucide="moon" class="moon-icon" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
                    <!-- Crear Incidente -->
                    <section class="card">
                        <div class="card-header">Reportar Nuevo Incidente</div>
                        <form id="form-incidente">
                            <div class="form-group">
                                <label for="titulo">Título Corto</label>
                                <input class="form-control" type="text" id="titulo" name="titulo" required placeholder="Ej: Falla en motor de cinta">
                            </div>
                            <div class="form-group">
                                <label for="severidad">Severidad</label>
                                <select class="form-control" id="severidad" name="severidad">
                                    <option value="baja">Baja (Informativo)</option>
                                    <option value="media">Media (Desviación)</option>
                                    <option value="alta">Alta (Parada de línea)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="linea_ejecucion_id">Línea Asociada</label>
                                <select class="form-control" id="linea_ejecucion_id" name="linea_ejecucion_id">
                                    <option value="">Ninguna / General</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="descripcion">Descripción del Problema</label>
                                <textarea class="form-control" id="descripcion" name="descripcion" rows="3" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">Registrar Incidente</button>
                        </form>
                    </section>

                    <!-- Listado Incidentes -->
                    <section class="card">
                        <div class="card-header">Incidentes Recientes</div>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Incidente</th>
                                        <th>Severidad</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-incidentes">
                                    <tr><td colspan="5" style="text-align: center;">Cargando...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para cierre (simulado con prompt por ahora o simplificado) -->

    <script src="js/incidentes.js"></script>
</body>
</html>
