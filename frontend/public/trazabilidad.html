<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/design-system/theme/index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trazabilidad | PROD-SYS</title>
        <link rel="stylesheet" href="/design-system/index.css">
    <script src="js/auth.js?v=1.5"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/design-system/index.js" defer></script>
</head>
<body>
            <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main-container" id="main-content">
            <header class="topbar">
                <h1>Trazabilidad</h1>
                <div class="topbar-actions">
                    <button id="theme-toggle" class="btn btn-secondary" style="padding: 4px 8px; min-height: 32px; border: none; background: transparent;" title="Cambiar tema">
                        <i data-lucide="sun" class="sun-icon" style="width: 18px; height: 18px;"></i>
                        <i data-lucide="moon" class="moon-icon" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="card-header">Rastrear Producto / Lote</div>
                    <div class="controls" style="display: flex; gap: 1rem;">
                        <input class="form-control" type="text" placeholder="Ingrese Código de Lote o Producto..." style="flex: 1;">
                        <button class="btn btn-primary">Consultar Historia</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">Flujo de Proceso (Genealogía)</div>
                    <div style="text-align: center; padding: 3rem; border: 2px dashed var(--border-color); border-radius: 0.5rem; color: var(--text-muted);">
                        Ingrese un identificador para visualizar la trazabilidad completa (Inputs → Outputs).
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/trazabilidad.js"></script>
    <script src="/js/sidebar.js"></script>
</body>
</html>
