<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/design-system/theme/index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesos Industriales | PROD-SYS</title>
    <link rel="stylesheet" href="/design-system/index.css">
    <script src="js/auth.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/design-system/index.js" defer></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main-container">
            <header class="topbar">
                <h1>Definición de Procesos Industriales</h1>
                <div class="topbar-actions">
                    <button id="theme-toggle" class="btn btn-secondary">
                        <i data-lucide="sun" class="sun-icon"></i>
                        <i data-lucide="moon" class="moon-icon"></i>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="alert alert-info mb-4">
                    <i data-lucide="info" style="width: 18px; height: 18px; margin-right: 8px; vertical-align: middle;"></i>
                    Esta es una vista de <strong>solo lectura</strong>. Los procesos están anclados al dominio industrial y no son editables desde la interfaz.
                </div>

                <div class="grid" id="procesos-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px;">
                    <!-- Cargando... -->
                    <div class="card p-4 text-center">Cargando procesos...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detalle del Proceso -->
    <div id="modal-proceso" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2 id="modal-proceso-titulo">Detalle del Proceso</h2>
                <button class="btn-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-proceso-body">
                <!-- Se llena dinámicamente -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="js/procesos.js"></script>
    <script src="js/main.js"></script>
    <script src="/js/sidebar.js"></script>
</body>
</html>
