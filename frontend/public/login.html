<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/design-system/theme/index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | PROD-SYS</title>
    <link rel="stylesheet" href="/design-system/index.css">
    <link rel="stylesheet" href="/design-system/utilities.css">
    <script src="js/auth.js"></script>
    <script src="/design-system/index.js" defer></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box card">
            <h1 class="login-title">PROD-SYS</h1>
            <p class="login-subtitle">Panel de Control Operativo</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input class="form-control" type="text" id="username" name="username" placeholder="Ingrese su usuario" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input class="form-control" type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
                </div>
                <div id="login-error" class="error-message d-none"></div>
                <button type="submit" id="btn-login" class="btn btn-primary w-100">Iniciar Sesión</button>
            </form>
        </div>
    </div>
    <!-- Modal Cambio de Contraseña Obligatorio -->
    <div id="modal-change-password" class="modal d-none">
        <div class="modal-content mw-400">
            <div class="modal-header">
                <h2>Cambio de Contraseña Obligatorio</h2>
            </div>
            <div class="modal-body">
                <p class="mb-3">Por seguridad, debe cambiar su contraseña temporal antes de continuar.</p>
                <form id="form-change-password">
                    <div class="form-group">
                        <label class="form-label">Contraseña Actual</label>
                        <input type="password" id="current-password" class="form-control" required readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nueva Contraseña</label>
                        <input type="password" id="new-password" class="form-control" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirmar Nueva Contraseña</label>
                        <input type="password" id="confirm-password" class="form-control" required minlength="8">
                    </div>
                    <div id="cp-error" class="error-message d-none mt-2"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="btn-save-password" class="btn btn-primary w-100">Cambiar Contraseña y Entrar</button>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
