<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/design-system/theme/index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Orden | PROD-SYS</title>
        <link rel="stylesheet" href="/design-system/index.css">
    <script src="js/auth.js?v=1.5"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/design-system/index.js" defer></script>
<script src="js/auth.js"></script>
</head>
<body>

        <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main-container" id="main-content">
            <header class="topbar">
                <h1>Detalles de Orden</h1>
                <div class="topbar-actions">
                    <button id="theme-toggle" class="btn btn-secondary" style="padding: 4px 8px; min-height: 32px; border: none; background: transparent;" title="Cambiar tema">
                        <i data-lucide="sun" class="sun-icon" style="width: 18px; height: 18px;"></i>
                        <i data-lucide="moon" class="moon-icon" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
                    <!-- Panel Izquierdo: Info General -->
                    <div style="display: flex; flex-direction: column; gap: 2rem;">
                        <section class="card">
                            <div class="card-header">Información General</div>
                            <div id="info-general" style="display: flex; flex-direction: column; gap: 1rem;">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </section>

                        <section class="card">
                            <div class="card-header">Resumen de Producción</div>
                            <div id="resumen-produccion" class="dashboard-grid" style="grid-template-columns: 1fr; gap: 1rem;">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </section>
                    </div>

                    <!-- Panel Derecho: Líneas e Historia -->
                    <div style="display: flex; flex-direction: column; gap: 2rem;">
                        <section class="card">
                            <div class="card-header">Líneas de Ejecución</div>
                            <div class="table-container">
                                <table class="table" id="tabla-lineas">
                                    <thead>
                                        <tr>
                                            <th>Proceso</th>
                                            <th>Estado</th>
                                            <th>Progreso</th>
                                            <th>Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <!-- Se llena dinámicamente -->
                                    </tbody>
                                </table>
                            </div>
                        </section>

                        <section class="card">
                            <div class="card-header">Historial de Eventos</div>
                            <div id="historial-eventos" style="display: flex; flex-direction: column; gap: 0.75rem;">
                                <p style="color: var(--text-muted);">Cargando historial...</p>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/detalles_orden.js"></script>
    <script src="/js/sidebar.js"></script>
</body>
</html>
