<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/design-system/theme/index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muestras de Calidad | PROD-SYS</title>
        <link rel="stylesheet" href="/design-system/index.css">
    <script src="js/auth.js?v=1.5"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/design-system/index.js" defer></script>
<script src="js/auth.js"></script>
</head>
<body>

            <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                PROD-SYS
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item nav-item-single ">
                    <i data-lucide="layout-dashboard" class="nav-icon"></i>
                    <span>Dashboard</span>
                </a>

                <div class="nav-group ">
                    <button class="nav-group-toggle">
                        <i data-lucide="clipboard-list" class="nav-icon"></i>
                        <span>Producción</span>
                        <i data-lucide="chevron-right" class="chevron"></i>
                    </button>
                    <div class="nav-group-items">
                        <a href="/bitacora.html" class="nav-item ">Bitácora de Turno</a>
                        <a href="/ordenes.html" class="nav-item ">Órdenes</a>
                        <a href="/ejecucion.html" class="nav-item ">Ejecución</a>
                        <a href="/incidentes.html" class="nav-item ">Incidentes</a>
                    </div>
                </div>

                <div class="nav-group ">
                    <button class="nav-group-toggle">
                        <i data-lucide="shield-check" class="nav-icon"></i>
                        <span>Control</span>
                        <i data-lucide="chevron-right" class="chevron"></i>
                    </button>
                    <div class="nav-group-items">
                        <a href="/calidad.html" class="nav-item ">Calidad</a>
                        <a href="/trazabilidad.html" class="nav-item ">Trazabilidad</a>
                    </div>
                </div>

                                <div class="nav-group " id="nav-group-admin">
                    <button class="nav-group-toggle">
                        <i data-lucide="settings" class="nav-icon"></i>
                        <span>Administración</span>
                        <i data-lucide="chevron-right" class="chevron"></i>
                    </button>
                    <div class="nav-group-items">
                        <div class="nav-section-label">Colaboradores</div>
                        <a href="/personal.html" class="nav-item ">Lista</a>
                        <a href="/grupos.html" class="nav-item ">Grupos</a>
                        <a href="/personal.html?view=usuarios" class="nav-item ">Usuarios</a>
                        <div class="nav-section-label">Sistema</div>
                        <a href="/auditoria.html" class="nav-item ">Auditoría</a>
                        <a href="/procesos.html" class="nav-item ">Procesos</a>
                    </div>
                </div>
            </nav>
            <div style="padding: 16px; border-top: 1px solid rgba(255,255,255,0.1);">
                <div id="user-display" style="margin-bottom: 12px; font-size: 13px; color: rgba(255,255,255,0.7);">
                    <i data-lucide="user" style="width:14px; height:14px; vertical-align:middle; margin-right:8px;"></i>
                    <span id="user-name-label">Usuario: -</span>
                </div>
                <a href="/login.html" id="logout-link" class="btn btn-secondary" style="width: 100%; justify-content: flex-start; background: rgba(255,255,255,0.1); border: none; color: white;">
                    <i data-lucide="log-out" class="nav-icon"></i>
                    <span>Cerrar Sesión</span>
                </a>
            </div>
        </aside>

        <div class="main-container" id="main-content">
            <header class="topbar">
                <h1>Muestras</h1>
                <div class="topbar-actions">
                    <button id="theme-toggle" class="btn btn-secondary" style="padding: 4px 8px; min-height: 32px; border: none; background: transparent;" title="Cambiar tema">
                        <i data-lucide="sun" class="sun-icon" style="width: 18px; height: 18px;"></i>
                        <i data-lucide="moon" class="moon-icon" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="card-header">Registrar Nueva Muestra</div>
                    <form id="form-crear-muestra">
                        <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label for="lote-produccion-id">Lote de Producción</label>
                                <select class="form-control" id="lote-produccion-id" name="lote-produccion-id" required>
                                    <option value="">Cargando lotes...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="resultado">Resultado</label>
                                <select class="form-control" id="resultado" name="resultado" required>
                                    <option value="">Seleccione un resultado</option>
                                    <option value="aprobado">Aprobado</option>
                                    <option value="rechazado">Rechazado</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="observaciones">Observaciones</label>
                            <textarea class="form-control" id="observaciones" name="observaciones" rows="3" placeholder="Detalles de la inspección..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Registrar Muestra</button>
                    </form>
                    <div id="mensaje-creacion" class="mt-4"></div>
                </div>

                <div class="card">
                    <div class="card-header">Historial de Muestras</div>
                    <div class="table-container">
                        <table class="table" id="tabla-muestras">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>ID de Lote</th>
                                    <th>Resultado</th>
                                    <th>Observaciones</th>
                                    <th>Fecha</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Las filas se insertarán aquí dinámicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/muestras.js"></script>
</body>
</html>
