
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de Telares - Sistema de Control Industrial</title>
    <link rel="stylesheet" href="design-system/index.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .telares-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        .telar-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 4px;
            transition: transform 0.2s;
            cursor: pointer;
            position: relative;
        }
        .telar-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary-base);
        }
        .telar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .telar-id {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-base);
        }
        .telar-info {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .telar-metrics {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }
        .metric-item {
            text-align: center;
        }
        .metric-value {
            font-weight: 600;
            display: block;
        }
        .metric-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .alert-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 10px;
            height: 10px;
            background-color: var(--danger);
            border-radius: 50%;
            display: none;
        }
        .badge-warning { background-color: var(--warning); color: #000; }
        .badge-error { background-color: var(--danger); color: #fff; }
        .badge-success { background-color: var(--success); color: #fff; }
    </style>
</head>
<body class="industrial-theme">
    <div class="layout">
        <div class="main-content">
            <header class="topbar">
                <div class="breadcrumb">
                    <a href="bitacora.html">Bitácora</a> / Telares
                </div>
                <div class="topbar-actions">
                    <span id="reloj-operativo" class="text-muted mr-4">--:--</span>
                    <button class="button button-outline" onclick="location.href='bitacora.html'">Volver</button>
                </div>
            </header>

            <div class="content-padding">
                <div class="section-header">
                    <div>
                        <h1>Panel de Control de Telares</h1>
                        <p class="text-muted">Resumen operativo de los 13 telares para el turno actual.</p>
                    </div>
                    <div id="resumen-global" class="dashboard-summary" style="display: flex; gap: 24px;">
                    </div>
                </div>

                <div id="telares-container" class="telares-grid">
                    <div class="loading-spinner">Cargando telares...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="design-system/index.js"></script>
    <script src="js/telares_resumen.js"></script>
</body>
</html>
