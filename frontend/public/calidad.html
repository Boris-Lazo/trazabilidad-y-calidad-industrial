<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/design-system/theme/index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calidad | PROD-SYS</title>
        <link rel="stylesheet" href="/design-system/index.css">
    <script src="js/auth.js?v=1.5"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/design-system/index.js" defer></script>
</head>
<body>
            <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main-container" id="main-content">
            <header class="topbar">
                <h1>Calidad</h1>
                <div class="topbar-actions">
                    <button id="theme-toggle" class="btn btn-secondary" style="padding: 4px 8px; min-height: 32px; border: none; background: transparent;" title="Cambiar tema">
                        <i data-lucide="sun" class="sun-icon" style="width: 18px; height: 18px;"></i>
                        <i data-lucide="moon" class="moon-icon" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="card-header">Órdenes Pendientes de Evaluación</div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Código Lote</th>
                                    <th>Proceso</th>
                                    <th>Orden</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="lista-calidad">
                                <tr><td colspan="6" style="text-align: center; color: var(--text-muted);">No hay lotes pendientes de evaluación en este momento.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/calidad.js"></script>
    <script src="/js/sidebar.js"></script>
</body>
</html>
