<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/design-system/theme/index.js"></script>
    <meta charset="UTF-8">

    <title>Auditoría | PROD-SYS</title>
        <link rel="stylesheet" href="/design-system/index.css">
    <script src="js/auth.js?v=1.5"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/design-system/index.js" defer></script>

<body>
            <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main-container" id="main-content">

                <h1>Auditoria</h1>
                <div class="topbar-actions">
                    <button id="theme-toggle" class="btn btn-secondary" style="padding: 4px 8px; min-height: 32px; border: none; background: transparent;" title="Cambiar tema">

                    </button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="card-header">Filtros de Búsqueda</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">

                        <select><option>Todas las Entidades</option></select>
                        <input class="form-control" type="date">
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">Logs de Actividad</div>

                        <table>

                            <tbody>
                                <tr>
                                    <td>2024-05-20 10:45:12</td>
                                    <td>admin</td>
                                    <td>CREATE</td>
                                    <td>OrdenProduccion</td>
                                    <td>Creada orden #OP-2024-001</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/auditoria.js"></script>
    <script src="/js/sidebar.js"></script>
</body>
</html>
