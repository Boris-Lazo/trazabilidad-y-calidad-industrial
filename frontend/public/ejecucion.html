<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/design-system/theme/index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejecución | PROD-SYS</title>
    <link rel="stylesheet" href="/design-system/index.css">
    <link rel="stylesheet" href="/css/telares.css">
    <script src="js/auth.js?v=1.5"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/design-system/index.js" defer></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-container" id="main-content">
    <header class="topbar">
      <h1>Ejecución de Turno</h1>
      <div class="topbar-actions">
        <button id="theme-toggle" class="btn btn-secondary"
                style="padding:4px 8px; min-height:32px; border:none; background:transparent;">
          <i data-lucide="sun" class="sun-icon" style="width:18px; height:18px;"></i>
          <i data-lucide="moon" class="moon-icon" style="width:18px; height:18px;"></i>
        </button>
      </div>
    </header>

    <div class="page-content" id="content-ejecucion">
      <!-- Card de bitácora activa -->
      <div class="card" id="card-bitacora-info" style="display:none; margin-bottom:1.5rem;">
        <div class="card-header">Bitácora Activa</div>
        <div style="display:flex; gap:2rem; padding:1rem; flex-wrap:wrap;">
          <div><small style="color:var(--text-secondary)">Turno</small><br><strong id="info-turno">-</strong></div>
          <div><small style="color:var(--text-secondary)">Fecha Operativa</small><br><strong id="info-fecha">-</strong></div>
          <div><small style="color:var(--text-secondary)">Estado</small><br>
            <span id="info-estado" class="badge badge-outline">-</span>
          </div>
        </div>
      </div>

      <!-- Grid de telares -->
      <div class="card">
        <div class="card-header">Estado de Telares — Haga clic para registrar producción</div>
        <div id="telares-ejecucion" class="telares-grid" style="padding:1rem;">
          <p class="text-muted">Cargando...</p>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/main.js"></script>
<script src="js/ejecucion.js"></script>
    <script src="/js/sidebar.js"></script>
</body>
</html>
